name: "temporal_transformer"
params:
  d_model: 128
  nhead: 4
  num_encoder_layers: 3
  dim_feedforward: 256
  dropout: 0.1
  max_seq_len: 64
  activation: "gelu"

training:
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.0001
  max_epochs: 40
  grad_clip_norm: 1.0
  early_stopping_patience: 6

loss:
  occurrence_weight: 1.0
  severity_weight: 0.5
  severity_mask_non_fire: true
