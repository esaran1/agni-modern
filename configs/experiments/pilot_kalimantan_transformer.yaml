# Temporal transformer on the same real pilot Parquet as tabular baselines.
# Uses the same temporal split as pilot_kalimantan_expanded for comparability.
experiment:
  name: "pilot_kalimantan_transformer"
  seed: 42

includes:
  data: "configs/data/pilot_kalimantan_expanded.yaml"
  features: "configs/features/base.yaml"
  model: "configs/models/transformer_pilot.yaml"

task:
  type: "multitask"
  horizon_days: 30

split:
  strategy: "temporal_holdout"
  train_end: "2023-09-21"
  val_end: "2023-10-07"
  test_end: "2023-10-31"
  # Same frozen spatial holdout as pilot_kalimantan_expanded so transformer
  # vs tabular comparisons are evaluated on identical held-out geography.
  holdout_regions: ["pilot_5_", "pilot_6_", "pilot_7_", "pilot_8_"]

outputs:
  model_dir: "outputs/models"
  metrics_dir: "outputs/metrics"
  predictions_dir: "outputs/predictions"
  plots_dir: "outputs/plots"
  maps_dir: "outputs/maps"

train:
  device: "cpu"
  batch_size: 64

eval:
  spatial_holdout_auto: false
  spatial_holdout_fraction: 0.25
