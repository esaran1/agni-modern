experiment:
  name: "pilot_occurrence_30d"
  seed: 42

includes:
  data: "configs/data/pilot_occurrence_jambi_small.yaml"
  features: "configs/features/base.yaml"
  model: "configs/models/xgb_occurrence.yaml"

task:
  type: "occurrence"
  mode: "real_pilot"
  horizon_days: 30
  baseline_models: ["logreg", "random_forest", "xgb_occurrence"]

split:
  strategy: "temporal_holdout"
  train_end: "2020-08-15"
  val_end: "2020-09-10"
  test_end: "2020-10-31"

outputs:
  model_dir: "outputs/models"
  metrics_dir: "outputs/metrics"
