experiment:
  name: "pilot_kalimantan_expanded"
  seed: 42

includes:
  data: "configs/data/pilot_kalimantan_expanded.yaml"
  features: "configs/features/base.yaml"
  model: "configs/models/xgb_occurrence.yaml"

task:
  type: "all"
  mode: "real_pilot"
  horizon_days: 30
  baseline_models: ["logreg", "random_forest", "xgb_occurrence"]
  severity_models: ["xgb_severity_cls", "xgb_severity_reg"]

split:
  strategy: "temporal_holdout"
  train_end: "2023-09-21"
  val_end: "2023-10-07"
  test_end: "2023-10-31"
  # Frozen via scripts/select_spatial_holdout.py — top-scoring contiguous
  # row band (n=272, n_pos=40, prevalence=0.147) for reproducible spatial
  # generalisation comparisons across runs.
  holdout_regions: ["pilot_5_", "pilot_6_", "pilot_7_", "pilot_8_"]

outputs:
  model_dir: "outputs/models"
  metrics_dir: "outputs/metrics"
  predictions_dir: "outputs/predictions"
  plots_dir: "outputs/plots"
  maps_dir: "outputs/maps"

# Spatial holdout is frozen above; auto mode left off so reruns are stable.
# When auto=true, evaluate.py uses the smart selector that requires the
# candidate band to contain min_positive samples.
eval:
  spatial_holdout_auto: false
  spatial_holdout_fraction: 0.25
